<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="./dark-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Badges — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./nav.js"></script>
</head>
<body>

<h1>Notification Badges</h1>
<p class="subtitle">CSS classes: <code>.elv-notification-badge</code>, <code>.elv-notification-badge--top</code>, <code>.elv-notification-badge--mid</code>, <code>.elv-notification-badge--low</code>, <code>.elv-notification-badge--with-count</code>, <code>.elv-notification-badge--dot</code></p>

<h2>With Count</h2>
<div class="component-row" elv>
  <span class="elv-notification-badge elv-notification-badge--top elv-notification-badge--with-count" elv>3</span>
  <span class="elv-notification-badge elv-notification-badge--top elv-notification-badge--with-count" elv>99</span>
  <span class="elv-notification-badge elv-notification-badge--top elv-notification-badge--with-count" elv>999</span>
</div>
<div class="component-row" elv>
  <span class="elv-notification-badge elv-notification-badge--mid elv-notification-badge--with-count" elv>12</span>
  <span class="elv-notification-badge elv-notification-badge--low elv-notification-badge--with-count" elv>4</span>
</div>

<h2>With Count and Dot</h2>
<div class="component-row" elv>
  <span class="elv-notification-badge elv-notification-badge--top elv-notification-badge--with-count" elv>1</span>
  <span class="elv-notification-badge elv-notification-badge--mid elv-notification-badge--with-count" elv>7</span>
  <span class="elv-notification-badge elv-notification-badge--low elv-notification-badge--with-count" elv>2</span>
</div>

<h2>Dot Only</h2>
<div class="component-row" elv>
  <span class="elv-notification-badge elv-notification-badge--top elv-notification-badge--dot" elv></span>
  <span class="elv-notification-badge elv-notification-badge--mid elv-notification-badge--dot" elv></span>
  <span class="elv-notification-badge elv-notification-badge--low elv-notification-badge--dot" elv></span>
</div>

</body>
</html>
