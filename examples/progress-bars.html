<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="./dark-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bars — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./nav.js"></script>
</head>
<body>

<h1>Progress Bars</h1>
<p class="subtitle">CSS classes: <code>.progress-bar</code>, <code>.progress-bar__track--{size}</code>, <code>.progress-bar__fill--{color}</code></p>

<h2>Brand (small track)</h2>
<div class="component-col" elv>
  <div class="progress-bar" elv>
    <div class="progress-bar__track progress-bar__track--sm" elv>
      <div class="progress-bar__fill progress-bar__fill--brand" style="width: 25%" elv></div>
    </div>
  </div>
  <div class="progress-bar" elv>
    <div class="progress-bar__track progress-bar__track--sm" elv>
      <div class="progress-bar__fill progress-bar__fill--brand" style="width: 50%" elv></div>
    </div>
  </div>
  <div class="progress-bar" elv>
    <div class="progress-bar__track progress-bar__track--sm" elv>
      <div class="progress-bar__fill progress-bar__fill--brand" style="width: 75%" elv></div>
    </div>
  </div>
  <div class="progress-bar" elv>
    <div class="progress-bar__track progress-bar__track--sm" elv>
      <div class="progress-bar__fill progress-bar__fill--brand" style="width: 100%" elv></div>
    </div>
  </div>
</div>

<h2>Primary (large track)</h2>
<div class="component-col" elv>
  <div class="progress-bar" elv>
    <div class="progress-bar__track progress-bar__track--lg" elv>
      <div class="progress-bar__fill progress-bar__fill--primary" style="width: 60%" elv></div>
    </div>
  </div>
</div>

<h2>Empty State</h2>
<div class="component-col" elv>
  <div class="progress-bar" elv>
    <div class="progress-bar__track progress-bar__track--sm" elv>
      <div class="progress-bar__fill progress-bar__fill--brand" style="width: 0%" elv></div>
    </div>
  </div>
</div>

</body>
</html>
