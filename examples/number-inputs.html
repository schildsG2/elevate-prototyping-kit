<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="./dark-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Input — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./nav.js"></script>
</head>
<body>

<h1>Number Input</h1>
<p class="subtitle">CSS component: <code>.number-input</code>. Custom stepper buttons with inlined chevron SVGs.</p>

<h2>Sizes</h2>
<div class="component-col" elv>
  <div class="component-row">
    <div>
      <label class="elv-label elv-label--sm">Small</label>
      <div class="number-input number-input--sm">
        <input type="text" inputmode="decimal" class="elv-input elv-input--sm" value="42">
        <div class="number-input__steppers">
          <button type="button" class="number-input__btn number-input__btn--incr" tabindex="-1" aria-label="Increment"></button>
          <button type="button" class="number-input__btn number-input__btn--decr" tabindex="-1" aria-label="Decrement"></button>
        </div>
      </div>
    </div>

    <div>
      <label class="elv-label">Medium</label>
      <div class="number-input number-input--md">
        <input type="text" inputmode="decimal" class="elv-input elv-input--md" value="100">
        <div class="number-input__steppers">
          <button type="button" class="number-input__btn number-input__btn--incr" tabindex="-1" aria-label="Increment"></button>
          <button type="button" class="number-input__btn number-input__btn--decr" tabindex="-1" aria-label="Decrement"></button>
        </div>
      </div>
    </div>

    <div>
      <label class="elv-label">Large</label>
      <div class="number-input number-input--lg">
        <input type="text" inputmode="decimal" class="elv-input elv-input--lg" value="1000">
        <div class="number-input__steppers">
          <button type="button" class="number-input__btn number-input__btn--incr" tabindex="-1" aria-label="Increment"></button>
          <button type="button" class="number-input__btn number-input__btn--decr" tabindex="-1" aria-label="Decrement"></button>
        </div>
      </div>
    </div>
  </div>
</div>

<h2>Disabled</h2>
<div class="component-col" elv>
  <div class="component-row">
    <div>
      <label class="elv-label">Disabled</label>
      <div class="number-input number-input--md">
        <input type="text" inputmode="decimal" class="elv-input elv-input--md" value="0" disabled>
        <div class="number-input__steppers">
          <button type="button" class="number-input__btn number-input__btn--incr" tabindex="-1" aria-label="Increment" disabled></button>
          <button type="button" class="number-input__btn number-input__btn--decr" tabindex="-1" aria-label="Decrement" disabled></button>
        </div>
      </div>
    </div>
  </div>
</div>

<h2>Read-only (no steppers)</h2>
<div class="component-col" elv>
  <div class="component-row">
    <div>
      <label class="elv-label">Read-only</label>
      <div class="number-input number-input--md">
        <input type="text" inputmode="decimal" class="elv-input elv-input--md" value="42" readonly>
      </div>
    </div>
  </div>
</div>

<h2>Status</h2>
<div class="component-col" elv>
  <div class="component-row">
    <div>
      <label class="elv-label">Error</label>
      <div class="number-input number-input--md number-input--error">
        <input type="text" inputmode="decimal" class="elv-input elv-input--md" value="-1" data-status="error">
        <div class="number-input__steppers">
          <button type="button" class="number-input__btn number-input__btn--incr" tabindex="-1" aria-label="Increment"></button>
          <button type="button" class="number-input__btn number-input__btn--decr" tabindex="-1" aria-label="Decrement"></button>
        </div>
      </div>
      <span class="helper-text helper-text--error">Must be a positive number</span>
    </div>

    <div>
      <label class="elv-label">Success</label>
      <div class="number-input number-input--md number-input--success">
        <input type="text" inputmode="decimal" class="elv-input elv-input--md" value="100" data-status="success">
        <div class="number-input__steppers">
          <button type="button" class="number-input__btn number-input__btn--incr" tabindex="-1" aria-label="Increment"></button>
          <button type="button" class="number-input__btn number-input__btn--decr" tabindex="-1" aria-label="Decrement"></button>
        </div>
      </div>
      <span class="helper-text helper-text--success">Looks good</span>
    </div>
  </div>
</div>

<h2>With label and helper text</h2>
<div class="component-col" elv>
  <div class="component-row">
    <div>
      <label class="elv-label elv-label--required">Review count</label>
      <div class="number-input number-input--md">
        <input type="text" inputmode="decimal" class="elv-input elv-input--md" value="0" placeholder="0">
        <div class="number-input__steppers">
          <button type="button" class="number-input__btn number-input__btn--incr" tabindex="-1" aria-label="Increment"></button>
          <button type="button" class="number-input__btn number-input__btn--decr" tabindex="-1" aria-label="Decrement"></button>
        </div>
      </div>
      <span class="helper-text">Enter total number of reviews</span>
    </div>
  </div>
</div>

</body>
</html>
